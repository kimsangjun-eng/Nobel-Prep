<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nobel Prep — SAT RW Module 1</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --navy: #1B2A4A;
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --white: #FFFFFF;
    --gray-50: #F8F9FA;
    --gray-100: #F0F2F5;
    --gray-200: #E2E6EA;
    --gray-400: #9BA3AF;
    --gray-600: #6B7280;
    --gray-800: #1F2937;
    --green: #16A34A;
    --red: #DC2626;
    --orange: #EA580C;
    --blue: #2563EB;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', serif;
    background: var(--gray-100);
    color: var(--gray-800);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  #header {
    background: var(--navy);
    color: var(--white);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 56px;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    font-family: 'Georgia', serif;
    font-size: 18px;
    font-weight: bold;
    color: var(--gold);
    letter-spacing: 0.5px;
  }

  .module-badge {
    background: rgba(201,168,76,0.2);
    border: 1px solid var(--gold);
    color: var(--gold-light);
    font-size: 12px;
    font-family: Arial, sans-serif;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  .mock-test-badge {
    background: var(--gold);
    color: var(--navy);
    font-size: 12px;
    font-weight: bold;
    font-family: Arial, sans-serif;
    padding: 3px 12px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  /* ── TIMER ── */
  #timer-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #timer-label {
    font-family: Arial, sans-serif;
    font-size: 10px;
    color: var(--gray-400);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  #timer-display {
    font-family: 'Courier New', monospace;
    font-size: 22px;
    font-weight: bold;
    color: var(--white);
    letter-spacing: 2px;
    transition: color 0.3s;
  }

  #timer-display.warn { color: #FFA500; }
  #timer-display.danger { color: #FF4444; animation: blink 1s infinite; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .header-right {
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: var(--gray-400);
  }

  /* ── MAIN LAYOUT ── */
  #main {
    margin-top: 56px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    height: calc(100vh - 56px - 70px);
    overflow: hidden;
  }

  /* ── PASSAGE PANEL ── */
  #passage-panel {
    background: var(--white);
    border-right: 2px solid var(--gray-200);
    overflow-y: auto;
    padding: 32px 28px;
  }

  .passage-source {
    font-family: Arial, sans-serif;
    font-size: 12px;
    color: var(--gray-600);
    font-style: italic;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--gray-200);
  }

  .passage-text {
    font-size: 15px;
    line-height: 1.85;
    color: var(--gray-800);
  }

  .passage-text p { margin-bottom: 14px; }

  .blank {
    display: inline-block;
    width: 80px;
    border-bottom: 2px solid var(--navy);
    margin: 0 4px;
    vertical-align: bottom;
  }

  /* Table in passage */
  .passage-table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-family: 'Courier New', monospace;
    font-size: 13px;
  }
  .passage-table th, .passage-table td {
    border: 1px solid var(--gray-400);
    padding: 7px 12px;
    text-align: center;
  }
  .passage-table th {
    background: var(--gray-100);
    font-weight: bold;
    color: var(--navy);
  }

  /* Notes format */
  .notes-list {
    margin: 10px 0;
    padding-left: 0;
    list-style: none;
  }
  .notes-list li {
    font-size: 15px;
    line-height: 1.7;
    padding: 2px 0;
    color: var(--gray-800);
  }
  .notes-list li::before {
    content: "• ";
    color: var(--navy);
    font-weight: bold;
  }

  /* Graph placeholder */
  .graph-placeholder {
    background: var(--gray-50);
    border: 2px solid var(--gray-200);
    border-radius: 8px;
    padding: 20px;
    margin: 12px 0;
    text-align: center;
  }
  .graph-svg { width: 100%; max-width: 340px; }

  /* ── QUESTION PANEL ── */
  #question-panel {
    background: var(--gray-50);
    overflow-y: auto;
    padding: 28px 28px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .q-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .q-number {
    background: var(--navy);
    color: var(--white);
    font-family: Arial, sans-serif;
    font-size: 13px;
    font-weight: bold;
    width: 32px; height: 32px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }

  .q-flag-btn {
    background: none;
    border: 1.5px solid var(--gray-400);
    border-radius: 6px;
    padding: 5px 10px;
    font-family: Arial, sans-serif;
    font-size: 12px;
    color: var(--gray-600);
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    transition: all 0.2s;
  }
  .q-flag-btn:hover { border-color: var(--gold); color: var(--gold); }
  .q-flag-btn.flagged {
    background: #FFF8E6;
    border-color: var(--gold);
    color: var(--gold);
  }

  .q-stem {
    font-size: 15px;
    line-height: 1.6;
    color: var(--gray-800);
    margin-bottom: 16px;
  }

  .choice-list { display: flex; flex-direction: column; gap: 10px; }

  .choice-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--white);
    border: 2px solid var(--gray-200);
    border-radius: 10px;
    padding: 12px 16px;
    cursor: pointer;
    font-family: 'Georgia', serif;
    font-size: 14.5px;
    line-height: 1.55;
    text-align: left;
    transition: all 0.15s;
    color: var(--gray-800);
  }
  .choice-btn:hover { border-color: var(--navy); background: #F0F4FF; }
  .choice-btn.selected { border-color: var(--navy); background: #EEF2FF; }
  .choice-btn.correct { border-color: var(--green); background: #F0FDF4; }
  .choice-btn.wrong { border-color: var(--red); background: #FEF2F2; }

  .choice-label {
    min-width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--gray-200);
    color: var(--gray-600);
    font-family: Arial, sans-serif;
    font-size: 13px;
    font-weight: bold;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .selected .choice-label { background: var(--navy); color: var(--white); }
  .correct .choice-label { background: var(--green); color: var(--white); }
  .wrong .choice-label { background: var(--red); color: var(--white); }

  /* ── BOTTOM NAV ── */
  #bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 70px;
    background: var(--white);
    border-top: 2px solid var(--gray-200);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    z-index: 100;
  }

  .nav-btn {
    background: var(--navy);
    color: var(--white);
    border: none;
    border-radius: 8px;
    padding: 10px 22px;
    font-family: Arial, sans-serif;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
  }
  .nav-btn:hover { background: #2a3f6b; }
  .nav-btn:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; }

  /* Question number dots */
  #q-dots {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 600px;
  }

  .q-dot {
    width: 30px; height: 30px;
    border-radius: 6px;
    border: 2px solid var(--gray-200);
    background: var(--white);
    font-family: Arial, sans-serif;
    font-size: 12px;
    font-weight: bold;
    color: var(--gray-600);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .q-dot:hover { border-color: var(--navy); }
  .q-dot.current { border-color: var(--navy); background: var(--navy); color: var(--white); }
  .q-dot.answered { border-color: var(--navy); background: #EEF2FF; color: var(--navy); }
  .q-dot.flagged-dot { border-color: var(--gold); background: #FFF8E6; color: var(--gold); }

  /* Submit button */
  #submit-btn {
    background: var(--gold);
    color: var(--navy);
    border: none;
    border-radius: 8px;
    padding: 10px 22px;
    font-family: Arial, sans-serif;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
  }
  #submit-btn:hover { background: var(--gold-light); }

  /* ── RESULT SCREEN ── */
  #result-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--gray-100);
    overflow-y: auto;
    z-index: 200;
  }

  .result-inner {
    max-width: 700px;
    margin: 40px auto;
    padding: 0 20px 60px;
  }

  .result-header {
    background: var(--navy);
    color: var(--white);
    border-radius: 16px;
    padding: 32px;
    text-align: center;
    margin-bottom: 24px;
  }

  .result-logo {
    font-family: 'Georgia', serif;
    font-size: 22px;
    color: var(--gold);
    font-weight: bold;
    margin-bottom: 6px;
  }

  .result-module {
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: var(--gray-400);
    margin-bottom: 24px;
  }

  .score-row {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-bottom: 8px;
  }

  .score-box {
    text-align: center;
  }

  .score-num {
    font-family: 'Georgia', serif;
    font-size: 48px;
    font-weight: bold;
    color: var(--gold);
    line-height: 1;
  }

  .score-label {
    font-family: Arial, sans-serif;
    font-size: 12px;
    color: var(--gray-400);
    margin-top: 4px;
  }

  .disclaimer {
    font-family: Arial, sans-serif;
    font-size: 11px;
    color: var(--gray-400);
    margin-top: 16px;
    font-style: italic;
  }

  /* Answer review */
  .review-title {
    font-family: Arial, sans-serif;
    font-size: 14px;
    font-weight: bold;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .review-item {
    background: var(--white);
    border-radius: 10px;
    border: 2px solid var(--gray-200);
    padding: 16px 20px;
    margin-bottom: 10px;
  }

  .review-item.correct { border-color: var(--green); }
  .review-item.wrong { border-color: var(--red); }
  .review-item.unanswered { border-color: var(--gray-400); }

  .review-q-num {
    font-family: Arial, sans-serif;
    font-size: 12px;
    font-weight: bold;
    color: var(--gray-600);
    margin-bottom: 6px;
  }

  .review-verdict {
    font-family: Arial, sans-serif;
    font-size: 13px;
    font-weight: bold;
    margin-bottom: 4px;
  }

  .correct .review-verdict { color: var(--green); }
  .wrong .review-verdict { color: var(--red); }
  .unanswered .review-verdict { color: var(--gray-600); }

  .review-answer {
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: var(--gray-600);
  }

  #print-btn {
    display: block;
    width: 100%;
    margin-top: 24px;
    padding: 14px;
    background: var(--navy);
    color: var(--white);
    border: none;
    border-radius: 10px;
    font-family: Arial, sans-serif;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
  }
  #print-btn:hover { background: #2a3f6b; }

  @media print {
    #print-btn { display: none; }
  }

  /* Progress bar */
  #progress-bar {
    height: 3px;
    background: var(--gray-200);
    position: fixed;
    top: 56px; left: 0; right: 0;
    z-index: 99;
  }
  #progress-fill {
    height: 100%;
    background: var(--gold);
    transition: width 0.3s;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="header-left">
    <div class="logo">Nobel Prep</div>
    <div class="mock-test-badge">Mock Test 1</div>
    <div class="module-badge">Reading & Writing · Module 1</div>
  </div>
  <div id="timer-wrap">
    <div id="timer-label">Time Remaining</div>
    <div id="timer-display">32:00</div>
  </div>
  <div style="display:flex; align-items:center; gap:14px;">
    <div class="header-right" id="q-counter">Question 1 of 27</div>
    <button onclick="confirmLogout()" style="background:none; border:1px solid rgba(255,255,255,0.25); color:rgba(255,255,255,0.6); font-size:11px; font-family:Arial,sans-serif; padding:4px 10px; border-radius:6px; cursor:pointer;">Sign Out</button>
  </div>
</div>

<!-- PROGRESS BAR -->
<div id="progress-bar"><div id="progress-fill" style="width:3.7%"></div></div>

<!-- MAIN CONTENT -->
<div id="main">
  <div id="passage-panel"></div>
  <div id="question-panel"></div>
</div>

<!-- BOTTOM NAV -->
<div id="bottom-nav">
  <button class="nav-btn" id="prev-btn" onclick="navigate(-1)" disabled>← Back</button>
  <div id="q-dots"></div>
  <div style="display:flex;gap:10px;align-items:center;">
    <button class="nav-btn" id="next-btn" onclick="navigate(1)">Next →</button>
    <button id="submit-btn" onclick="confirmSubmit()">Submit Module</button>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="result-screen">
  <div class="result-inner">
    <div class="result-header">
      <div class="result-logo">Nobel Prep</div>
      <div class="result-module">SAT Practice · Reading & Writing Module 1</div>
      <div class="score-row">
        <div class="score-box">
          <div class="score-num" id="res-raw">—</div>
          <div class="score-label">Raw Score (out of 27)</div>
        </div>
        <div class="score-box">
          <div class="score-num" id="res-pct">—</div>
          <div class="score-label">Accuracy</div>
        </div>
      </div>
      <div class="disclaimer">※ This is Module 1 only. Full RW score calculated after completing Module 2.</div>
    </div>

    <div class="review-title">Answer Review</div>
    <div id="review-list"></div>
    <button id="print-btn" onclick="window.print()">🖨 Print Result / Save as PDF</button>
  </div>
</div>

<script>
// ── SUPABASE 초기화 ──
const SUPABASE_URL = 'https://ucodcbfnuiixgaaflfnr.supabase.co';
const SUPABASE_KEY = 'sb_publishable_vzZuK0RJdZ2ZCpavnngIPw_bG6phgkf';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
const EXAM_ID = 'sat-aug2024-us-rw-m1';
let currentUser = null;

// 로그인 확인 + 재풀기 차단
async function confirmLogout() {
  if (!confirm('Sign out now? Your progress on this module will be lost if not submitted.')) return;
  await sb.auth.signOut();
  window.location.href = 'index.html';
}

async function initExam() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    window.location.href = 'index.html';
    return;
  }
  currentUser = session.user;

  // 이미 제출한 경우 → Module 2로 안내 (결과는 노출하지 않음)
  const { data: existing } = await sb
    .from('exam_results')
    .select('completed')
    .eq('user_id', currentUser.id)
    .eq('exam_id', EXAM_ID)
    .single();

  if (existing?.completed) {
    showAlreadyDoneScreen();
    return;
  }

  // 정상 시작
  renderQuestion(0);
  startTimer();
}

function showAlreadyDoneScreen() {
  document.body.innerHTML = `
    <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:#F0F2F5; font-family: Arial, sans-serif;">
      <div style="background:white; border-radius:16px; padding:48px 40px; max-width:420px; text-align:center; box-shadow:0 8px 40px rgba(27,42,74,0.15);">
        <div style="font-family: Georgia, serif; font-size:22px; font-weight:bold; color:#1B2A4A; margin-bottom:6px;">Module 1 Already Submitted</div>
        <div style="font-size:13px; color:#6B7280; margin-bottom:24px; line-height:1.6;">You have already completed Module 1.<br>Retaking is not allowed.</div>
        <button onclick="window.location.href='exam2.html'" style="background:#1B2A4A; color:white; border:none; border-radius:10px; padding:13px 28px; font-size:14px; font-weight:bold; cursor:pointer;">Continue to Module 2 →</button>
      </div>
    </div>
  `;
}

// ── ANSWER KEY (SHA-256 will be used in production; plain for demo) ──
const ANSWER_KEY = {
  1:'B', 2:'B', 3:'A', 4:'B', 5:'D',
  6:'B', 7:'B', 8:'D', 9:'C', 10:'B',
  11:'C', 12:'C', 13:'C', 14:'A', 15:'D',
  16:'B', 17:'A', 18:'D', 19:'C', 20:'A',
  21:'B', 22:'D', 23:'D', 24:'D', 25:'A',
  26:'A', 27:'A'
};

// ── QUESTION DATA ──
const QUESTIONS = [
  {
    id: 1,
    passage: `<p class="passage-source">The following text is adapted from Mary Seacole's 1857 autobiography <em>Wonderful Adventures of Mrs. Seacole in Many Lands</em>.</p>
    <p class="passage-text">That journey across the Isthmus [of Panama], insignificant in distance as it was, was by no means an easy one. It seemed as if nature had determined to throw every <strong>conceivable</strong> obstacle in the way of those who should seek to join the two great oceans of the world.</p>`,
    stem: `As used in the text, what does the word "conceivable" most nearly mean?`,
    choices: { A:'Visible', B:'Possible', C:'Regular', D:'Open' }
  },
  {
    id: 2,
    passage: `<p class="passage-text">In a 2018 article celebrating films depicting the Black experience, critics for the <em>New York Times</em> __________ William Greaves's 1968 film <em>Symbiopsychotaxiplasm, Take One</em> and Spike Lee's 1992 film <em>Malcolm X</em>, praising the former as "a vital artifact of its time" and the latter as "electrifying."</p>`,
    stem: `Which choice completes the text with the most logical and precise word or phrase?`,
    choices: { A:'overlooked', B:'commended', C:'satirized', D:'inspired' }
  },
  {
    id: 3,
    passage: `<p class="passage-text">Louise Arner Boyd, who led several scientific expeditions off the coast of Greenland in the 1930s, undoubtedly accomplished much, but to gain a lasting place in our historical memory, there is little that can __________ being the first to do something. For example, people will always remember that Enid Gordon-Gallien led the expedition that first mapped the area around Kalambo Falls between Zambia and Tanzania.</p>`,
    stem: `Which choice completes the text with the most logical and precise word or phrase?`,
    choices: { A:'prevail over', B:'constrain within', C:'overreach by', D:'fluctuate with' }
  },
  {
    id: 4,
    passage: `<p class="passage-text"><em>The Last of England</em>, painted in the realist style by Ford Madox Brown, depicts a working-class family immigrating to Australia to start a new life. The realists' emphasis on accurately portraying the experiences of average working people was largely a rejection of the romantic style evident in many paintings by Leon Belly, which instead __________ their subjects' beauty or heroism while hiding all imperfection.</p>`,
    stem: `Which choice completes the text with the most logical and precise word or phrase?`,
    choices: { A:'undermine', B:'exaggerate', C:'correct', D:'mock' }
  },
  {
    id: 5,
    passage: `<p class="passage-text">When people think of dinosaurs with feathers, they typically think of winged dinosaurs, such as the bat-like Yi qi. However, many dinosaurs that didn't have wings also had feathers on their bodies. For instance, research indicates that the wingless, predatory Juravenator likely had feathers.</p>`,
    stem: `Which choice best states the main purpose of the text?`,
    choices: {
      A:'To argue that only one species of dinosaur had feathers',
      B:'To explain why feathered dinosaurs went extinct',
      C:'To point out the differences between dinosaur feathers and bird feathers',
      D:'To discuss the presence of feathers on certain types of dinosaurs'
    }
  },
  {
    id: 6,
    passage: `<p class="passage-text">Can field mustard plants grow on Mars? Can pea plants? You might think the answer to these questions is obviously no, but researchers in the Netherlands recently showed that the seeds of many common plant species can germinate in soil designed to simulate Martian conditions, as long as water is supplied. In fact, some species actually did better in Martian soil than in Earth soil: 30 percent of field mustard seeds sprouted when planted in simulated Martian soil, compared with 4 percent that did when planted in soil from their home planet.</p>`,
    stem: `Which choice best states the main purpose of the text?`,
    choices: {
      A:'To explain an important study of differences in the composition of Martian soil and the composition of Earth soil',
      B:'To present a surprising finding about plants grown in soil intended to be similar to Martian soil',
      C:'To answer long-standing questions about how Martian soil conditions can be replicated on Earth',
      D:'To discuss an unexpected result about the role of water in plants grown in simulated Martian conditions'
    }
  },

  }).join('');

  document.getElementById('question-panel').innerHTML = `
    <div class="q-header">
      <div class="q-number">${q.id}</div>
      <button class="q-flag-btn ${flagClass}" onclick="toggleFlag(${q.id})" id="flag-btn-${q.id}">
        🚩 ${flagged[q.id] ? 'Flagged' : 'Mark for Review'}
      </button>
    </div>
    <div class="q-stem">${q.stem}</div>
    <div class="choice-list">${choicesHTML}</div>
  `;

  // Nav state
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').disabled = idx === QUESTIONS.length - 1;
  document.getElementById('q-counter').textContent = `Question ${idx+1} of ${QUESTIONS.length}`;

  // Progress
  const pct = ((idx + 1) / QUESTIONS.length * 100).toFixed(1);
  document.getElementById('progress-fill').style.width = pct + '%';

  // Dots
  renderDots();
}

function renderDots() {
  const container = document.getElementById('q-dots');
  container.innerHTML = QUESTIONS.map((q,i) => {
    let cls = 'q-dot';
    if (i === currentQ) cls += ' current';
    else if (flagged[q.id]) cls += ' flagged-dot';
    else if (userAnswers[q.id]) cls += ' answered';
    return `<button class="${cls}" onclick="goTo(${i})">${q.id}</button>`;
  }).join('');
}

function selectChoice(qId, choice) {
  if (submitted) return;
  userAnswers[qId] = choice;
  renderQuestion(currentQ);
}

function toggleFlag(qId) {
  flagged[qId] = !flagged[qId];
  const btn = document.getElementById(`flag-btn-${qId}`);
  if (btn) {
    btn.className = `q-flag-btn ${flagged[qId] ? 'flagged' : ''}`;
    btn.textContent = `🚩 ${flagged[qId] ? 'Flagged' : 'Mark for Review'}`;
  }
  renderDots();
}

function navigate(dir) {
  const next = currentQ + dir;
  if (next >= 0 && next < QUESTIONS.length) {
    currentQ = next;
    renderQuestion(currentQ);
    document.getElementById('passage-panel').scrollTop = 0;
    document.getElementById('question-panel').scrollTop = 0;
  }
}

function goTo(idx) {
  currentQ = idx;
  renderQuestion(currentQ);
}

// ── SUBMIT ──
function confirmSubmit() {
  const answered = Object.keys(userAnswers).length;
  const unanswered = QUESTIONS.length - answered;
  let msg = `Submit Module 1?\n\nAnswered: ${answered} / ${QUESTIONS.length}`;
  if (unanswered > 0) msg += `\nUnanswered: ${unanswered} questions`;
  msg += `\n\nYou cannot return to Module 1 after submitting.`;
  if (confirm(msg)) submitExam(false);
}

async function submitExam(timeUp) {
  submitted = true;
  clearInterval(timerInterval);

  // 점수 계산
  let correct = 0;
  QUESTIONS.forEach(q => {
    if (userAnswers[q.id] === ANSWER_KEY[q.id]) correct++;
  });

  // Supabase 저장 (결과는 백그라운드 저장만, 화면에는 표시하지 않음)
  if (currentUser) {
    await sb.from('exam_results').upsert({
      user_id: currentUser.id,
      exam_id: EXAM_ID,
      completed: true,
      rw_m1_raw: correct,
      answers: userAnswers,
      submitted_at: new Date().toISOString()
    }, { onConflict: 'user_id,exam_id' });
  }

  // 결과 화면 없이 즉시 Module 2로 자동 전환 (실제 Digital SAT와 동일)
  showTransitionScreen(timeUp);
}

function showTransitionScreen(timeUp) {
  document.body.innerHTML = `
    <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:#F0F2F5; font-family: Arial, sans-serif;">
      <div style="background:white; border-radius:16px; padding:48px 40px; max-width:420px; text-align:center; box-shadow:0 8px 40px rgba(27,42,74,0.15);">
        <div style="font-family: Arial, sans-serif; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:#C9A84C; font-weight:bold; margin-bottom:8px;">Mock Test 1</div>
        <div style="font-family: Georgia, serif; font-size:22px; font-weight:bold; color:#1B2A4A; margin-bottom:6px;">Module 1 Complete</div>
        <div style="font-size:13px; color:#6B7280; margin-bottom:24px;">${timeUp ? 'Time is up.' : 'Your answers have been submitted.'}</div>
        <div style="width:36px; height:36px; border:3px solid #E2E6EA; border-top-color:#C9A84C; border-radius:50%; margin:0 auto 20px; animation:spin 0.8s linear infinite;"></div>
        <div style="font-size:13px; color:#1B2A4A; font-weight:bold;">Starting Module 2...</div>
        <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
      </div>
    </div>
  `;
  setTimeout(() => {
    window.location.href = 'exam2.html';
  }, 1800);
}

// ── INIT ──
initExam();
</script>
</body>
</html>
