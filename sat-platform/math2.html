<style>
  :root{--navy:#1B2A4A;--gold:#C9A84C;--white:#FFFFFF;--gray-50:#F8F9FA;--gray-100:#F0F2F5;--gray-200:#E2E6EA;--gray-400:#9BA3AF;--gray-600:#6B7280;--gray-800:#1F2937;--red:#DC2626;--orange:#EA580C;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:Georgia,serif;background:var(--gray-100);color:var(--gray-800);height:100vh;overflow:hidden;display:flex;flex-direction:column;}
  .exam-header{background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;flex-shrink:0;}
  .header-logo{font-family:Arial,sans-serif;font-weight:bold;font-size:16px;}
  .header-logo .prep{color:var(--gold);}
  .header-center{display:flex;align-items:center;gap:10px;}
  .mock-badge{background:var(--gold);color:var(--navy);font-family:Arial,sans-serif;font-weight:bold;font-size:11px;padding:3px 10px;border-radius:12px;}
  .module-badge{background:rgba(255,255,255,0.15);color:#fff;font-family:Arial,sans-serif;font-size:11px;padding:3px 10px;border-radius:12px;}
  .header-right{display:flex;align-items:center;gap:14px;}
  .timer-display{font-family:Arial,sans-serif;font-size:15px;font-weight:bold;background:rgba(255,255,255,0.12);padding:4px 12px;border-radius:8px;min-width:64px;text-align:center;}
  .timer-display.warn{background:#EA580C;}
  .timer-display.danger{background:var(--red);animation:blink 1s step-start infinite;}
  @keyframes blink{50%{opacity:.4}}
  .signout-btn{background:transparent;border:1px solid rgba(255,255,255,0.35);color:#fff;font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;}
  .progress-bar-wrap{background:var(--gray-200);height:3px;flex-shrink:0;}
  .progress-bar-fill{height:100%;background:var(--gold);transition:width .3s;}
  .exam-main{flex:1;display:flex;overflow:hidden;}
  .passage-panel{width:50%;border-right:1px solid var(--gray-200);overflow-y:auto;padding:24px 22px;background:#fff;}
  .question-panel{width:50%;overflow-y:auto;padding:24px 22px;background:var(--gray-50);}
  .q-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .q-number{background:var(--navy);color:#fff;font-family:Arial,sans-serif;font-weight:bold;font-size:13px;width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;}
  .q-flag-btn{background:transparent;border:1.5px solid var(--gray-400);color:var(--gray-600);font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;}
  .q-flag-btn.flagged{border-color:var(--gold);color:var(--gold);background:#FFF8E8;}
  .q-stem{font-size:13.5px;line-height:1.65;margin-bottom:16px;}
  .choice-list{display:flex;flex-direction:column;gap:8px;}
  .choice-btn{display:flex;align-items:flex-start;gap:10px;background:#fff;border:1.5px solid var(--gray-200);border-radius:8px;padding:10px 14px;cursor:pointer;text-align:left;font-family:Georgia,serif;font-size:13px;line-height:1.5;transition:border-color .15s,background .15s;width:100%;}
  .choice-btn:hover{border-color:var(--navy);background:#F0F4FF;}
  .choice-btn.selected{border-color:var(--navy);background:#EEF2FF;}
  .choice-label{background:var(--navy);color:#fff;font-family:Arial,sans-serif;font-weight:bold;font-size:11px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
  .choice-btn.selected .choice-label{background:var(--gold);}
  .spr-wrap{margin-top:8px;}
  .spr-label{font-family:Arial,sans-serif;font-size:11px;color:var(--gray-600);margin-bottom:6px;}
  .spr-input{width:200px;height:48px;border:2px solid var(--gray-400);border-radius:8px;padding:0 14px;font-size:16px;font-family:Georgia,serif;text-align:center;outline:none;transition:border-color .15s;}
  .spr-input:focus{border-color:var(--navy);}
  .spr-input.filled{border-color:var(--navy);background:#EEF2FF;}
  .exam-footer{background:#fff;border-top:1px solid var(--gray-200);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .nav-btn{background:var(--navy);color:#fff;font-family:Arial,sans-serif;font-size:13px;font-weight:bold;padding:8px 22px;border:none;border-radius:8px;cursor:pointer;}
  .nav-btn:disabled{background:var(--gray-400);cursor:not-allowed;}
  .nav-btn.secondary{background:#fff;color:var(--navy);border:1.5px solid var(--navy);}
  .submit-btn{background:var(--gold);color:var(--navy);font-family:Arial,sans-serif;font-size:13px;font-weight:bold;padding:8px 22px;border:none;border-radius:8px;cursor:pointer;}
  .dot-nav{display:flex;gap:5px;flex-wrap:wrap;max-width:360px;}
  .dot{width:22px;height:22px;border-radius:50%;border:2px solid #ccc;background:#fff;font-family:Arial,sans-serif;font-size:9px;font-weight:bold;color:var(--gray-600);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .dot.answered{background:var(--navy);border-color:var(--navy);color:#fff;}
  .dot.current{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold);}
  .dot.flagged-dot{border-color:var(--gold);}
  /* Results */
  .results-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1B2A4A;padding:24px;}
  .results-card{background:#fff;border-radius:20px;padding:40px 36px;max-width:560px;width:100%;text-align:center;}
  .results-title{font-family:Arial,sans-serif;font-size:11px;color:var(--gold);font-weight:bold;letter-spacing:1.5px;margin-bottom:8px;}
  .results-total{font-family:Arial,sans-serif;font-size:52px;font-weight:900;color:var(--navy);line-height:1;}
  .results-label{font-family:Arial,sans-serif;font-size:13px;color:var(--gray-600);margin:4px 0 24px;}
  .score-row{display:flex;justify-content:center;gap:32px;margin-bottom:24px;}
  .score-box{background:var(--gray-50);border-radius:12px;padding:16px 24px;min-width:120px;}
  .score-box-label{font-family:Arial,sans-serif;font-size:10px;color:var(--gray-600);font-weight:bold;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
  .score-box-val{font-family:Arial,sans-serif;font-size:28px;font-weight:bold;color:var(--navy);}
  .score-box-sub{font-family:Arial,sans-serif;font-size:11px;color:var(--gray-400);}
</style>

  {id:9,type:'SPR',passage:'<div style="padding:20px;font-family:Georgia,serif;font-size:13px;"><table style="border-collapse:collapse;"><tr><th style="border:1px solid #888;padding:6px 16px;background:#f5f5f5;font-style:italic;">x</th><th style="border:1px solid #888;padding:6px 16px;background:#f5f5f5;font-style:italic;">y</th></tr><tr><td style="border:1px solid #888;padding:6px 16px;text-align:center;">0</td><td style="border:1px solid #888;padding:6px 16px;text-align:center;">n</td></tr><tr><td style="border:1px solid #888;padding:6px 16px;text-align:center;">4</td><td style="border:1px solid #888;padding:6px 16px;text-align:center;">n + 19</td></tr><tr><td style="border:1px solid #888;padding:6px 16px;text-align:center;">8</td><td style="border:1px solid #888;padding:6px 16px;text-align:center;">n + 38</td></tr></table></div>',
   stem:'<p style="font-size:13.5px;line-height:1.7;">There is a linear relationship between <em>x</em> and <em>y</em>. The table shows three values of <em>x</em> and their corresponding values of <em>y</em> in terms of a constant <em>n</em>. What is the slope of the line that represents this relationship in the <em>xy</em>-plane?</p>'},
  {id:10,type:'SPR',passage:'',
   stem:'<p style="font-size:13.5px;line-height:1.7;">18<em>x</em><sup>2</sup> + 24<em>x</em> + <em>c</em> = 0<br/><br/>In the given equation, <em>c</em> is a constant. The equation has exactly one solution. What is the value of <em>c</em>?</p>'},
  {id:11,type:'SPR',passage:'',
   stem:'<p style="font-size:13.5px;line-height:1.7;">(<em>x</em> &minus; 3) &minus; 8(<em>y</em> + 9) = 129<br/>(<em>x</em> &minus; 3) + 8(<em>y</em> + 9) = 432<br/><br/>The solution to the given system of equations is (<em>x</em>, <em>y</em>). What is the value of 8(<em>x</em> &minus; 3)?</p>'},
  {id:12,type:'MCQ',passage:'',
   stem:'<p style="font-size:13.5px;line-height:1.7;">The volume of a right rectangular prism with a square base is 2448 cubic centimeters. If the area of the square base is 144 square centimeters, what is the area, in square centimeters, of one of the four lateral faces of the prism?</p>',
   choices:{A:'17',B:'204',C:'540',D:'816'}},
  {id:13,type:'MCQ',passage:'',
   stem:'<p style="font-size:13.5px;line-height:1.7;"><em>y</em> = 5(<em>x</em> &minus; 2)<sup>2</sup><br/><em>y</em> = 10(<em>x</em> &minus; 2)<br/><br/>A solution to the given system of equations is (<em>x</em>, <em>y</em>). What is one possible value of (<em>x</em> + <em>y</em>)?</p>',
   choices:{A:'&minus;20',B:'4',C:'20',D:'24'}},
  {id:14,type:'SPR',passage:'',
   stem:'<p style="font-size:13.5px;line-height:1.7;">The graph of the quadratic function <em>y = f(x)</em> in the <em>xy</em>-plane intersects the <em>x</em>-axis when <em>x</em> = 39 and when <em>x</em> = <em>p</em>, where <em>p</em> is a constant. The maximum value of <em>y = f(x)</em> occurs at the point (14, <em>m</em>), where <em>m</em> is a constant. What is the value of <em>p</em>?</p>'},
  {id:15,type:'SPR',passage:'',
   stem:'<p style="font-size:13.5px;line-height:1.7;"><em>k</em>/<em>x</em> = 174<br/><br/>In the given equation, <em>k</em> is a constant. The solution to the given equation is 1/174. What is the value of <em>k</em>?</p>'},
  {id:16,type:'SPR',passage:'',
   stem:'<p style="font-size:13.5px;line-height:1.7;">The area of a triangle is equal to <em>x</em><sup>2</sup> square centimeters. The length of the base of the triangle is 2<em>x</em> + 6 centimeters, and the height of the triangle is <em>x</em> &minus; 2 centimeters. What is the value of <em>x</em>?</p>'},
  {id:17,type:'MCQ',passage:'',
   stem:'<p style="font-size:13.5px;line-height:1.7;">The function <em>g</em> is a quadratic function. In the <em>xy</em>-plane, the graph of <em>y = g(x)</em> has a vertex at (&minus;1, &minus;4) and passes through the points (&minus;2, &minus;43) and (1, &minus;160). What is the value of <em>g</em>(0) &minus; <em>g</em>(2)?</p>',
   choices:{A:'&minus;121',B:'0',C:'117',D:'312'}},
  {id:18,type:'MCQ',passage:'',
   stem:'<p style="font-size:13.5px;line-height:1.7;">Triangles <em>ABC</em> and <em>DEF</em> are congruent, where <em>A</em> corresponds to <em>D</em>, and <em>B</em> and <em>E</em> are right angles. The measure of angle <em>A</em> is 62&deg;. What is the measure of angle <em>F</em>?</p>',
   choices:{A:'28&deg;',B:'62&deg;',C:'90&deg;',D:'118&deg;'}},
  {id:19,type:'MCQ',passage:'',
   stem:'<p style="font-size:13.5px;line-height:1.7;">A business consultant charges $408 for the first hour and $204 for each additional hour of work. Which of the following functions gives the charge <em>C</em>, in dollars, for <em>h</em> hours of work, where <em>h</em> is a positive integer?</p>',
   choices:{A:'C(h) = 204h + 204',B:'C(h) = 204h + 408',C:'C(h) = 408h + 204',D:'C(h) = 408h + 612'}},
  {id:20,type:'MCQ',passage:'',
   stem:'<p style="font-size:13.5px;line-height:1.7;">An acceptable noise criterion rating for the background noise in a laundry room is 50. For a noise criterion rating of 50, the equation <em>y</em> = 22(0.997)<sup><em>x</em>&minus;60</sup> + 47 gives the estimated sound pressure level, <em>y</em>, in decibels, as a function of the octave band center frequency, <em>x</em>, in hertz, where <em>x</em> &ge; 60. Which of the following is the best interpretation of 47 in this context?</p>',
   choices:{A:'47 is 22 less than the estimated sound pressure level, in decibels, at an octave band center frequency of 60 hertz.',B:'47 is 22 less than the estimated sound pressure level, in decibels, at an octave band center frequency of 0 hertz.',C:'47 is the estimated sound pressure level, in decibels, at an octave band center frequency of 60 hertz.',D:'47 is the estimated sound pressure level, in decibels, at an octave band center frequency of 0 hertz.'}},
  {id:21,type:'SPR',passage:'',

async function confirmLogout(){
  if(!confirm('Sign out now? Progress will be lost.'))return;
  await sb.auth.signOut();window.location.href='index.html';
}

async function initExam(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='index.html';return;}
  currentUser=session.user;
  const{data:prev}=await sb.from('exam_results').select('completed').eq('user_id',currentUser.id).eq('exam_id',PREV_EXAM_ID).single();
  if(!prev?.completed){showNeedPrevScreen();return;}
  const{data:existing}=await sb.from('exam_results').select('completed').eq('user_id',currentUser.id).eq('exam_id',EXAM_ID).single();
  if(existing?.completed){await showFinalResults();return;}
  renderQuestion(0);startTimer();
}

function showNeedPrevScreen(){
  document.body.innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1B2A4A;"><div style="background:white;border-radius:16px;padding:48px 40px;max-width:420px;text-align:center;"><div style="font-size:36px;margin-bottom:16px;">&#9888;&#65039;</div><h2 style="font-family:Arial,sans-serif;color:#1B2A4A;margin-bottom:12px;">Module Required</h2><p style="font-family:Arial,sans-serif;color:#6B7280;font-size:14px;margin-bottom:24px;">You must complete Math Module 1 before starting Math Module 2.</p><button onclick="window.location.href='math1.html'" style="background:#1B2A4A;color:white;border:none;padding:12px 28px;border-radius:8px;font-family:Arial,sans-serif;font-weight:bold;cursor:pointer;">Go to Math Module 1</button></div></div>`;
}

function renderQuestion(idx){
  currentIdx=idx;const q=QUESTIONS[idx];
  document.getElementById('passage-panel').innerHTML=q.passage||'<div style="padding:20px;font-family:Arial,sans-serif;font-size:11px;font-weight:bold;color:#6B7280;text-transform:uppercase;letter-spacing:1px;">Math &mdash; Module 2</div>';
  const fc=flagged[q.id]?'flagged':'';
  let inputHTML='';
  if(q.type==='MCQ'){
    inputHTML='<div class="choice-list">'+Object.entries(q.choices).map(([k,v])=>{
      const sel=userAnswers[q.id]===k?'selected':'';
      return `<button class="choice-btn ${sel}" onclick="selectChoice(${q.id},'${k}')"><span class="choice-label">${k}</span><span>${v}</span></button>`;
    }).join('')+'</div>';
  }else{
    const val=userAnswers[q.id]||'';
    inputHTML=`<div class="spr-wrap"><div class="spr-label">Enter your answer:</div><input class="spr-input${val?' filled':''}" id="spr-${q.id}" type="text" value="${val}" placeholder="Your answer" oninput="sprInput(${q.id},this.value)"/></div>`;
  }
  document.getElementById('question-panel').innerHTML=`<div class="q-header"><div class="q-number">${q.id}</div><button class="q-flag-btn ${fc}" onclick="toggleFlag(${q.id})" id="flag-btn-${q.id}">&#128681; ${flagged[q.id]?'Flagged':'Mark for Review'}</button></div><div class="q-stem">${q.stem}</div>${inputHTML}`;
  document.getElementById('prev-btn').disabled=(idx===0);
  const isLast=idx===QUESTIONS.length-1;
  document.getElementById('next-btn').style.display=isLast?'none':'';
  document.getElementById('submit-btn').style.display=isLast?'':'none';
  const ac=Object.keys(userAnswers).length;
  document.getElementById('progress-bar').style.width=`${ac/QUESTIONS.length*100}%`;
  renderDots();
}

function renderDots(){
  document.getElementById('dot-nav').innerHTML=QUESTIONS.map((q,i)=>{
    let c='';
    if(userAnswers[q.id]!==undefined)c+=' answered';
    if(i===currentIdx)c+=' current';
    if(flagged[q.id])c+=' flagged-dot';
    return `<div class="dot${c}" onclick="renderQuestion(${i})">${q.id}</div>`;
  }).join('');
}

function selectChoice(qId,key){userAnswers[qId]=key;renderQuestion(currentIdx);}
function sprInput(qId,val){
  if(val.trim())userAnswers[qId]=val.trim();else delete userAnswers[qId];
  const inp=document.getElementById(`spr-${qId}`);
  if(inp)inp.className='spr-input'+(val.trim()?' filled':'');
  renderDots();
  document.getElementById('progress-bar').style.width=`${Object.keys(userAnswers).length/QUESTIONS.length*100}%`;
}
function toggleFlag(qId){
  flagged[qId]=!flagged[qId];
  const btn=document.getElementById(`flag-btn-${qId}`);
  if(btn){btn.className='q-flag-btn'+(flagged[qId]?' flagged':'');btn.innerHTML='&#128681; '+(flagged[qId]?'Flagged':'Mark for Review');}
  renderDots();
}
function navigate(dir){const n=currentIdx+dir;if(n>=0&&n<QUESTIONS.length)renderQuestion(n);}
function confirmSubmit(){
  const ua=QUESTIONS.length-Object.keys(userAnswers).length;
  if(confirm(ua>0?`You have ${ua} unanswered question(s). Submit anyway?`:'Submit Math Module 2 and finish the exam?'))submitExam(false);
}

async function submitExam(timeUp){
  if(submitted)return;submitted=true;clearInterval(timerInterval);
  let correct=0;
  QUESTIONS.forEach(q=>{
    if(q.type==='MCQ'){if(userAnswers[q.id]===ANSWER_KEY[q.id])correct++;}
    else if(ANSWER_KEY[q.id]!=='OPEN'){if(sprMatch(userAnswers[q.id],String(ANSWER_KEY[q.id])))correct++;}
  });
  if(currentUser){
    await sb.from('exam_results').upsert({
      user_id:currentUser.id,exam_id:EXAM_ID,completed:true,
      math_m2_raw:correct,answers:userAnswers,submitted_at:new Date().toISOString()
    },{onConflict:'user_id,exam_id'});
  }
  await showFinalResults(correct);
}

async function showFinalResults(math2Raw){
  // 전체 점수 불러오기
  const uid=currentUser?.id;
  if(!uid){document.body.innerHTML='<p>Error loading results.</p>';return;}
  const{data:rows}=await sb.from('exam_results')
    .select('exam_id,rw_m1_raw,rw_m2_raw,math_m1_raw,math_m2_raw')
    .eq('user_id',uid)
    .in('exam_id',[RW_M1_ID,RW_M2_ID,PREV_EXAM_ID,EXAM_ID]);

  let rwM1=0,rwM2=0,mathM1=0,mathM2=0;
  (rows||[]).forEach(r=>{
    if(r.exam_id===RW_M1_ID)rwM1=r.rw_m1_raw||0;
    if(r.exam_id===RW_M2_ID)rwM2=r.rw_m2_raw||0;
    if(r.exam_id===PREV_EXAM_ID)mathM1=r.math_m1_raw||0;
    if(r.exam_id===EXAM_ID)mathM2=r.math_m2_raw||(math2Raw||0);
  });

  const rwTotal=rwM1+rwM2;
  const mathTotal=mathM1+mathM2;
  const rwScaled=RW_TABLE[Math.min(rwTotal,54)]||200;
  const mathScaled=MATH_TABLE[Math.min(mathTotal,44)]||200;
  const total=rwScaled+mathScaled;

  document.body.innerHTML=`
  <div class="results-wrap">
    <div class="results-card">
      <div class="results-title">MOCK TEST 1 &mdash; COMPLETE</div>
      <div class="results-total">${total}</div>
      <div class="results-label">Total Score (out of 1600)</div>
      <div class="score-row">
        <div class="score-box">
          <div class="score-box-label">Reading &amp; Writing</div>
          <div class="score-box-val">${rwScaled}</div>
          <div class="score-box-sub">Raw: ${rwTotal}/54</div>
        </div>
        <div class="score-box">
          <div class="score-box-label">Math</div>
          <div class="score-box-val">${mathScaled}</div>
          <div class="score-box-sub">Raw: ${mathTotal}/44</div>
        </div>
      </div>
      <div style="background:#F0F2F5;border-radius:10px;padding:14px 18px;font-family:Arial,sans-serif;font-size:12px;color:#6B7280;margin-bottom:20px;text-align:left;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
          <span>RW Module 1:</span><span style="color:#1B2A4A;font-weight:bold;">${rwM1}/27</span>
          <span>RW Module 2:</span><span style="color:#1B2A4A;font-weight:bold;">${rwM2}/27</span>
          <span>Math Module 1:</span><span style="color:#1B2A4A;font-weight:bold;">${mathM1}/22</span>
          <span>Math Module 2:</span><span style="color:#1B2A4A;font-weight:bold;">${mathM2}/22</span>
        </div>
      </div>
      <button onclick="window.location.href='index.html'" style="background:#1B2A4A;color:#fff;border:none;padding:12px 32px;border-radius:8px;font-family:Arial,sans-serif;font-weight:bold;cursor:pointer;font-size:14px;">
        Return to Home
      </button>
    </div>
  </div>`;
}

function startTimer(){
  updateTimerDisplay();
  timerInterval=setInterval(()=>{secondsLeft--;updateTimerDisplay();if(secondsLeft<=0){clearInterval(timerInterval);submitExam(true);}},1000);
}
function updateTimerDisplay(){
  const m=Math.floor(secondsLeft/60),s=secondsLeft%60;
  const el=document.getElementById('timer');
  el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.className='timer-display';
  if(secondsLeft<=60)el.classList.add('danger');
  else if(secondsLeft<=300)el.classList.add('warn');
}
initExam();
</script>
</body>
</html>
