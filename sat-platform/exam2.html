<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nobel Prep — SAT RW Module 2</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --navy: #1B2A4A;
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --white: #FFFFFF;
    --gray-50: #F8F9FA;
    --gray-100: #F0F2F5;
    --gray-200: #E2E6EA;
    --gray-400: #9BA3AF;
    --gray-600: #6B7280;
    --gray-800: #1F2937;
    --green: #16A34A;
    --red: #DC2626;
    --orange: #EA580C;
    --blue: #2563EB;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', serif;
    background: var(--gray-100);
    color: var(--gray-800);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  #header {
    background: var(--navy);
    color: var(--white);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 56px;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    font-family: 'Georgia', serif;
    font-size: 18px;
    font-weight: bold;
    color: var(--gold);
    letter-spacing: 0.5px;
  }

  .module-badge {
    background: rgba(201,168,76,0.2);
    border: 1px solid var(--gold);
    color: var(--gold-light);
    font-size: 12px;
    font-family: Arial, sans-serif;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  .mock-test-badge {
    background: var(--gold);
    color: var(--navy);
    font-size: 12px;
    font-weight: bold;
    font-family: Arial, sans-serif;
    padding: 3px 12px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  /* ── TIMER ── */
  #timer-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #timer-label {
    font-family: Arial, sans-serif;
    font-size: 10px;
    color: var(--gray-400);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  #timer-display {
    font-family: 'Courier New', monospace;
    font-size: 22px;
    font-weight: bold;
    color: var(--white);
    letter-spacing: 2px;
    transition: color 0.3s;
  }

  #timer-display.warn { color: #FFA500; }
  #timer-display.danger { color: #FF4444; animation: blink 1s infinite; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .header-right {
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: var(--gray-400);
  }

  /* ── MAIN LAYOUT ── */
  #main {
    margin-top: 56px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    height: calc(100vh - 56px - 70px);
    overflow: hidden;
  }

  /* ── PASSAGE PANEL ── */
  #passage-panel {
    background: var(--white);
    border-right: 2px solid var(--gray-200);
    overflow-y: auto;
    padding: 32px 28px;
  }

  .passage-source {
    font-family: Arial, sans-serif;
    font-size: 12px;
    color: var(--gray-600);
    font-style: italic;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--gray-200);
  }

  .passage-text {
    font-size: 15px;
    line-height: 1.85;
    color: var(--gray-800);
  }

  .passage-text p { margin-bottom: 14px; }

  .blank {
    display: inline-block;
    width: 80px;
    border-bottom: 2px solid var(--navy);
    margin: 0 4px;
    vertical-align: bottom;
  }

  /* Table in passage */
  .passage-table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-family: 'Courier New', monospace;
    font-size: 13px;
  }
  .passage-table th, .passage-table td {
    border: 1px solid var(--gray-400);
    padding: 7px 12px;
    text-align: center;
  }
  .passage-table th {
    background: var(--gray-100);
    font-weight: bold;
    color: var(--navy);
  }

  /* Notes format */
  .notes-list {
    margin: 10px 0;
    padding-left: 0;
    list-style: none;
  }
  .notes-list li {
    font-size: 15px;
    line-height: 1.7;
    padding: 2px 0;
    color: var(--gray-800);
  }
  .notes-list li::before {
    content: "• ";
    color: var(--navy);
    font-weight: bold;
  }

  /* Graph placeholder */
  .graph-placeholder {
    background: var(--gray-50);
    border: 2px solid var(--gray-200);
    border-radius: 8px;
    padding: 20px;
    margin: 12px 0;
    text-align: center;
  }
  .graph-svg { width: 100%; max-width: 340px; }

  /* ── QUESTION PANEL ── */
  #question-panel {
    background: var(--gray-50);
    overflow-y: auto;
    padding: 28px 28px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .q-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .q-number {
    background: var(--navy);
    color: var(--white);
    font-family: Arial, sans-serif;
    font-size: 13px;
    font-weight: bold;
    width: 32px; height: 32px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }

  .q-flag-btn {
    background: none;
    border: 1.5px solid var(--gray-400);
    border-radius: 6px;
    padding: 5px 10px;
    font-family: Arial, sans-serif;
    font-size: 12px;
    color: var(--gray-600);
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    transition: all 0.2s;
  }
  .q-flag-btn:hover { border-color: var(--gold); color: var(--gold); }
  .q-flag-btn.flagged {
    background: #FFF8E6;
    border-color: var(--gold);
    color: var(--gold);
  }

  .q-stem {
    font-size: 15px;
    line-height: 1.6;
    color: var(--gray-800);
    margin-bottom: 16px;
  }

  .choice-list { display: flex; flex-direction: column; gap: 10px; }

  .choice-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--white);
    border: 2px solid var(--gray-200);
    border-radius: 10px;
    padding: 12px 16px;
    cursor: pointer;
    font-family: 'Georgia', serif;
    font-size: 14.5px;
    line-height: 1.55;
    text-align: left;
    transition: all 0.15s;
    color: var(--gray-800);
  }
  .choice-btn:hover { border-color: var(--navy); background: #F0F4FF; }
  .choice-btn.selected { border-color: var(--navy); background: #EEF2FF; }
  .choice-btn.correct { border-color: var(--green); background: #F0FDF4; }
  .choice-btn.wrong { border-color: var(--red); background: #FEF2F2; }

  .choice-label {
    min-width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--gray-200);
    color: var(--gray-600);
    font-family: Arial, sans-serif;
    font-size: 13px;
    font-weight: bold;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .selected .choice-label { background: var(--navy); color: var(--white); }
  .correct .choice-label { background: var(--green); color: var(--white); }
  .wrong .choice-label { background: var(--red); color: var(--white); }

  /* ── BOTTOM NAV ── */
  #bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 70px;
    background: var(--white);
    border-top: 2px solid var(--gray-200);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    z-index: 100;
  }

  .nav-btn {
    background: var(--navy);
    color: var(--white);
    border: none;
    border-radius: 8px;
    padding: 10px 22px;
    font-family: Arial, sans-serif;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
  }
  .nav-btn:hover { background: #2a3f6b; }
  .nav-btn:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; }

  /* Question number dots */
  #q-dots {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 600px;
  }

  .q-dot {
    width: 30px; height: 30px;
    border-radius: 6px;
    border: 2px solid var(--gray-200);
    background: var(--white);
    font-family: Arial, sans-serif;
    font-size: 12px;
    font-weight: bold;
    color: var(--gray-600);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .q-dot:hover { border-color: var(--navy); }
  .q-dot.current { border-color: var(--navy); background: var(--navy); color: var(--white); }
  .q-dot.answered { border-color: var(--navy); background: #EEF2FF; color: var(--navy); }
  .q-dot.flagged-dot { border-color: var(--gold); background: #FFF8E6; color: var(--gold); }

  /* Submit button */
  #submit-btn {
    background: var(--gold);
    color: var(--navy);
    border: none;
    border-radius: 8px;
    padding: 10px 22px;
    font-family: Arial, sans-serif;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
  }
  #submit-btn:hover { background: var(--gold-light); }

  /* ── RESULT SCREEN ── */
  #result-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--gray-100);
    overflow-y: auto;
    z-index: 200;
  }

  .result-inner {
    max-width: 700px;
    margin: 40px auto;
    padding: 0 20px 60px;
  }

  .result-header {
    background: var(--navy);
    color: var(--white);
    border-radius: 16px;
    padding: 32px;
    text-align: center;
    margin-bottom: 24px;
  }

  .result-logo {
    font-family: 'Georgia', serif;
    font-size: 22px;
    color: var(--gold);
    font-weight: bold;
    margin-bottom: 6px;
  }

  .result-module {
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: var(--gray-400);
    margin-bottom: 24px;
  }

  .score-row {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-bottom: 8px;
  }

  .score-box {
    text-align: center;
  }

  .score-num {
    font-family: 'Georgia', serif;
    font-size: 48px;
    font-weight: bold;
    color: var(--gold);
    line-height: 1;
  }

  .score-label {
    font-family: Arial, sans-serif;
    font-size: 12px;
    color: var(--gray-400);
    margin-top: 4px;
  }

  .disclaimer {
    font-family: Arial, sans-serif;
    font-size: 11px;
    color: var(--gray-400);
    margin-top: 16px;
    font-style: italic;
  }

  /* Answer review */
  .review-title {
    font-family: Arial, sans-serif;
    font-size: 14px;
    font-weight: bold;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .review-item {
    background: var(--white);
    border-radius: 10px;
    border: 2px solid var(--gray-200);
    padding: 16px 20px;
    margin-bottom: 10px;
  }

  .review-item.correct { border-color: var(--green); }
  .review-item.wrong { border-color: var(--red); }
  .review-item.unanswered { border-color: var(--gray-400); }

  .review-q-num {
    font-family: Arial, sans-serif;
    font-size: 12px;
    font-weight: bold;
    color: var(--gray-600);
    margin-bottom: 6px;
  }

  .review-verdict {
    font-family: Arial, sans-serif;
    font-size: 13px;
    font-weight: bold;
    margin-bottom: 4px;
  }

  .correct .review-verdict { color: var(--green); }
  .wrong .review-verdict { color: var(--red); }
  .unanswered .review-verdict { color: var(--gray-600); }

  .review-answer {
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: var(--gray-600);
  }

  #print-btn {
    display: block;
    width: 100%;
    margin-top: 24px;
    padding: 14px;
    background: var(--navy);
    color: var(--white);
    border: none;
    border-radius: 10px;
    font-family: Arial, sans-serif;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
  }
  #print-btn:hover { background: #2a3f6b; }

  @media print {
    #print-btn { display: none; }
  }

  /* Progress bar */
  #progress-bar {
    height: 3px;
    background: var(--gray-200);
    position: fixed;
    top: 56px; left: 0; right: 0;
    z-index: 99;
  }
  #progress-fill {
    height: 100%;
    background: var(--gold);
    transition: width 0.3s;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="header-left">
    <div class="logo">Nobel Prep</div>
    <div class="mock-test-badge">Mock Test 1</div>
    <div class="module-badge">Reading & Writing · Module 2</div>
  </div>
  <div id="timer-wrap">
    <div id="timer-label">Time Remaining</div>
    <div id="timer-display">32:00</div>
  </div>
  <div style="display:flex; align-items:center; gap:14px;">
    <div class="header-right" id="q-counter">Question 1 of 27</div>
    <button onclick="confirmLogout()" style="background:none; border:1px solid rgba(255,255,255,0.25); color:rgba(255,255,255,0.6); font-size:11px; font-family:Arial,sans-serif; padding:4px 10px; border-radius:6px; cursor:pointer;">Sign Out</button>
  </div>
</div>

<!-- PROGRESS BAR -->
<div id="progress-bar"><div id="progress-fill" style="width:3.7%"></div></div>

<!-- MAIN CONTENT -->
<div id="main">
  <div id="passage-panel"></div>
  <div id="question-panel"></div>
</div>

<!-- BOTTOM NAV -->
<div id="bottom-nav">
  <button class="nav-btn" id="prev-btn" onclick="navigate(-1)" disabled>← Back</button>
  <div id="q-dots"></div>
  <div style="display:flex;gap:10px;align-items:center;">
    <button class="nav-btn" id="next-btn" onclick="navigate(1)">Next →</button>
    <button id="submit-btn" onclick="confirmSubmit()">Submit Module</button>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="result-screen">
  <div class="result-inner">
    <div class="result-header">
      <div class="result-logo">Nobel Prep</div>
      <div class="result-module">SAT Practice · Reading & Writing Module 2</div>
      <div class="score-row">
        <div class="score-box">
          <div class="score-num" id="res-raw">—</div>
          <div class="score-label">Raw Score (out of 27)</div>
        </div>
        <div class="score-box">
          <div class="score-num" id="res-pct">—</div>
          <div class="score-label">Accuracy</div>
        </div>
      </div>
      <div class="disclaimer">※ This is Module 2. Combine with Module 1 score for full RW section score.</div>
    </div>

    <div class="review-title">Answer Review</div>
    <div id="review-list"></div>
    <button id="print-btn" onclick="window.print()">🖨 Print Result / Save as PDF</button>
  </div>
</div>

<script>
// ── SUPABASE 초기화 ──
const SUPABASE_URL = 'https://ucodcbfnuiixgaaflfnr.supabase.co';
const SUPABASE_KEY = 'sb_publishable_vzZuK0RJdZ2ZCpavnngIPw_bG6phgkf';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
const EXAM_ID = 'sat-aug2024-us-rw-m2';
let currentUser = null;

// 로그인 확인 + 재풀기 차단
async function confirmLogout() {
  if (!confirm('Sign out now? Your progress on this module will be lost if not submitted.')) return;
  await sb.auth.signOut();
  window.location.href = 'index.html';
}

async function initExam() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    window.location.href = 'index.html';
    return;
  }
  currentUser = session.user;

  // RW Module 1을 먼저 풀었는지 확인
  const { data: m1 } = await sb
    .from('exam_results')
    .select('completed')
    .eq('user_id', currentUser.id)
    .eq('exam_id', 'sat-aug2024-us-rw-m1')
    .single();

  if (!m1?.completed) {
    showNeedModule1Screen();
    return;
  }

  // 이미 Module 2 제출한 경우 → Math로 안내
  const { data: existing } = await sb
    .from('exam_results')
    .select('completed')
    .eq('user_id', currentUser.id)
    .eq('exam_id', EXAM_ID)
    .single();

  if (existing?.completed) {
    showAlreadyDoneScreen();
    return;
  }

  // 정상 시작
  renderQuestion(0);
  startTimer();
}

function showNeedModule1Screen() {
  document.body.innerHTML = `
    <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:#F0F2F5; font-family: Arial, sans-serif;">
      <div style="background:white; border-radius:16px; padding:48px 40px; max-width:420px; text-align:center; box-shadow:0 8px 40px rgba(27,42,74,0.15);">
        <div style="font-family: Georgia, serif; font-size:22px; font-weight:bold; color:#1B2A4A; margin-bottom:6px;">Module 1 Required</div>
        <div style="font-size:13px; color:#6B7280; margin-bottom:24px; line-height:1.6;">You must complete Reading and Writing Module 1 before starting Module 2.</div>
        <button onclick="window.location.href='exam.html'" style="background:#1B2A4A; color:white; border:none; border-radius:10px; padding:13px 28px; font-size:14px; font-weight:bold; cursor:pointer;">Go to Module 1 →</button>
      </div>
    </div>
  `;
}

function showAlreadyDoneScreen() {
  document.body.innerHTML = `
    <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:#F0F2F5; font-family: Arial, sans-serif;">
      <div style="background:white; border-radius:16px; padding:48px 40px; max-width:420px; text-align:center; box-shadow:0 8px 40px rgba(27,42,74,0.15);">
        <div style="font-family: Georgia, serif; font-size:22px; font-weight:bold; color:#1B2A4A; margin-bottom:6px;">Reading and Writing Already Complete</div>
        <div style="font-size:13px; color:#6B7280; margin-bottom:24px; line-height:1.6;">You have already completed both modules.<br>Retaking is not allowed.</div>
        <button onclick="window.location.href='math1.html'" style="background:#1B2A4A; color:white; border:none; border-radius:10px; padding:13px 28px; font-size:14px; font-weight:bold; cursor:pointer;">Continue to Math →</button>
      </div>
    </div>
  `;
}

// ── ANSWER KEY (SHA-256 will be used in production; plain for demo) ──
const ANSWER_KEY = {
  1:'C', 2:'B', 3:'D', 4:'A', 5:'C',
  6:'C', 7:'D', 8:'A', 9:'A', 10:'C',
  11:'B', 12:'A', 13:'D', 14:'A', 15:'D',
  16:'B', 17:'B', 18:'A', 19:'A', 20:'C',
  21:'C', 22:'A', 23:'B', 24:'C', 25:'B',
  26:'A', 27:'A'
};

// ── QUESTION DATA ──
const QUESTIONS = [
  {
    id: 1,
    passage: `<p class="passage-text">Writer Lydia Davis observed that while traditional literary forms, such as the novel, are recognizable as such even as they evolve, there are more __________ forms that might, for example, borrow elements from both fables and realist narratives to make something unconventional. The late-period pieces of James Tate arguably fit in this category, since they straddle the line between prose and poetry.</p>`,
    stem: `Which choice completes the text with the most logical and precise word or phrase?`,
    choices: { A:'dispersed', B:'customary', C:'amorphous', D:'neutral' }
  },
  {
    id: 2,
    passage: `<p class="passage-text">A speaker at a recent children's book publishing conference noted that, while many illustrators do excellent work, in her mind, no one has ever __________ Amos Ferguson's work as the illustrator of <em>Under the Sunday Tree</em>: there is no better example of the form, according to the speaker.</p>`,
    stem: `Which choice completes the text with the most logical and precise word or phrase?`,
    choices: { A:'convened', B:'eclipsed', C:'cited', D:'augmented' }
  },
  {
    id: 3,
    passage: `<p class="passage-text">Some robots such as Justin (developed in 2008) and TALOS (developed in 2017) feature humanoid characteristics like the ability to respond to voice commands so that people will find it easier to interact with them. While these features can help to __________ feelings of comfort in people, a robot that looks too human can fall into the "uncanny valley," meaning that its appearance unintentionally unsettles those who encounter it.</p>`,
    stem: `Which choice completes the text with the most logical and precise word or phrase?`,
    choices: { A:'counterbalance', B:'repudiate', C:'constrict', D:'engender' }
  },
  {
    id: 4,
    passage: `<p class="passage-text">Though most hoaxes perpetrated as jokes by mischievous users of Wikipedia, an online encyclopedia that almost anyone can freely edit, have quickly been detected and removed, a few entries that knowledgeable readers should have realized were __________, such as those for the country singer-songwriter Joseph G. Williams and the television miniseries <em>Sheer Perfection</em>, persisted on the site for many years before they were finally recognized as falsehoods and deleted.</p>`,
    stem: `Which choice completes the text with the most logical and precise word or phrase?`,
    choices: { A:'spurious', B:'scrupulous', C:'palpable', D:'compulsory' }
  },
  {

    stem: `Which choice most effectively uses information from the given sentences to make and support a generalization about symbols on flags?`,
    choices: {
      A:'Many countries feature symbols on their flags, and the study of these designs is known as vexillology.',
      B:"Cyprus's flag includes an olive branch, a symbol that is important to that country's national identity.",
      C:"The flags of some countries include symbols of plants; Cyprus's, for example,",
      D:'Vexillology is the study of flags; accordingly, vexillologists are interested in flags from around the world.'
    }
  }
];


// ── STATE ──
let currentQ = 0;
let userAnswers = {};
let flagged = {};
let submitted = false;
let timerSeconds = 32 * 60;
let timerInterval;

// ── TIMER ──
function startTimer() {
  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      submitExam(true);
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  const disp = document.getElementById('timer-display');
  disp.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  disp.className = '';
  if (timerSeconds <= 60) disp.classList.add('danger');
  else if (timerSeconds <= 300) disp.classList.add('warn');
}

// ── RENDER ──
function renderQuestion(idx) {
  const q = QUESTIONS[idx];

  // Passage
  document.getElementById('passage-panel').innerHTML = q.passage;

  // Question panel
  const flagClass = flagged[q.id] ? 'flagged' : '';
  let choicesHTML = Object.entries(q.choices).map(([k,v]) => {
    const selClass = userAnswers[q.id] === k ? 'selected' : '';
    return `<button class="choice-btn ${selClass}" onclick="selectChoice(${q.id},'${k}')">
      <span class="choice-label">${k}</span>
      <span>${v}</span>
    </button>`;
  }).join('');

  document.getElementById('question-panel').innerHTML = `
    <div class="q-header">
      <div class="q-number">${q.id}</div>
      <button class="q-flag-btn ${flagClass}" onclick="toggleFlag(${q.id})" id="flag-btn-${q.id}">
        🚩 ${flagged[q.id] ? 'Flagged' : 'Mark for Review'}
      </button>
    </div>
    <div class="q-stem">${q.stem}</div>
    <div class="choice-list">${choicesHTML}</div>
  `;

  // Nav state
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').disabled = idx === QUESTIONS.length - 1;
  document.getElementById('q-counter').textContent = `Question ${idx+1} of ${QUESTIONS.length}`;

  // Progress
  const pct = ((idx + 1) / QUESTIONS.length * 100).toFixed(1);
  document.getElementById('progress-fill').style.width = pct + '%';

  // Dots
  renderDots();
}

function renderDots() {
  const container = document.getElementById('q-dots');
  container.innerHTML = QUESTIONS.map((q,i) => {
    let cls = 'q-dot';
    if (i === currentQ) cls += ' current';
    else if (flagged[q.id]) cls += ' flagged-dot';
    else if (userAnswers[q.id]) cls += ' answered';
    return `<button class="${cls}" onclick="goTo(${i})">${q.id}</button>`;
  }).join('');
}

function selectChoice(qId, choice) {
  if (submitted) return;
  userAnswers[qId] = choice;
  renderQuestion(currentQ);
}

function toggleFlag(qId) {
  flagged[qId] = !flagged[qId];
  const btn = document.getElementById(`flag-btn-${qId}`);
  if (btn) {
    btn.className = `q-flag-btn ${flagged[qId] ? 'flagged' : ''}`;
    btn.textContent = `🚩 ${flagged[qId] ? 'Flagged' : 'Mark for Review'}`;
  }
  renderDots();
}

function navigate(dir) {
  const next = currentQ + dir;
  if (next >= 0 && next < QUESTIONS.length) {
    currentQ = next;
    renderQuestion(currentQ);
    document.getElementById('passage-panel').scrollTop = 0;
    document.getElementById('question-panel').scrollTop = 0;
  }
}

function goTo(idx) {
  currentQ = idx;
  renderQuestion(currentQ);
}

// ── SUBMIT ──
function confirmSubmit() {
  const answered = Object.keys(userAnswers).length;
  const unanswered = QUESTIONS.length - answered;
  let msg = `Submit Module 2?\n\nAnswered: ${answered} / ${QUESTIONS.length}`;
  if (unanswered > 0) msg += `\nUnanswered: ${unanswered} questions`;
  msg += `\n\nThis completes the Reading and Writing section. A 10-minute break will follow.`;
  if (confirm(msg)) submitExam(false);
}

async function submitExam(timeUp) {
  submitted = true;
  clearInterval(timerInterval);

  // 점수 계산
  let correct = 0;
  QUESTIONS.forEach(q => {
    if (userAnswers[q.id] === ANSWER_KEY[q.id]) correct++;
  });

  // Supabase 저장 (결과는 백그라운드 저장만, 화면에는 표시하지 않음)
  if (currentUser) {
    await sb.from('exam_results').upsert({
      user_id: currentUser.id,
      exam_id: EXAM_ID,
      completed: true,
      rw_m2_raw: correct,
      answers: userAnswers,
      submitted_at: new Date().toISOString()
    }, { onConflict: 'user_id,exam_id' });
  }

  // RW 섹션 완료 → 10분 휴식 화면으로 전환
  showBreakScreen();
}

function showBreakScreen() {
  const BREAK_SECONDS = 10 * 60;
  let remaining = BREAK_SECONDS;

  document.body.innerHTML = `
    <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:#1B2A4A; font-family: Arial, sans-serif;">
      <div style="background:white; border-radius:16px; padding:48px 44px; max-width:440px; text-align:center; box-shadow:0 8px 40px rgba(0,0,0,0.3);">
        <div style="font-family: Georgia, serif; font-size:13px; letter-spacing:2px; text-transform:uppercase; color:#C9A84C; font-weight:bold; margin-bottom:10px;">Mock Test 1 · Reading and Writing — Complete</div>
        <div style="font-family: Georgia, serif; font-size:24px; font-weight:bold; color:#1B2A4A; margin-bottom:20px;">10-Minute Break</div>
        <div id="break-timer" style="font-family:'Courier New',monospace; font-size:48px; font-weight:bold; color:#1B2A4A; letter-spacing:3px; margin-bottom:20px;">10:00</div>
        <div style="font-size:13px; color:#6B7280; line-height:1.6; margin-bottom:28px;">
          You may step away from your screen.<br>
          The Math section will begin automatically when the break ends.
        </div>
        <button id="skip-break-btn" onclick="skipBreak()" style="background:none; border:1.5px solid #1B2A4A; color:#1B2A4A; border-radius:8px; padding:10px 22px; font-size:13px; font-weight:bold; cursor:pointer;">Skip Break & Start Math →</button>
      </div>
    </div>
  `;

  const timerEl = document.getElementById('break-timer');
  const breakInterval = setInterval(() => {
    remaining--;
    const m = Math.floor(remaining / 60);
    const s = remaining % 60;
    timerEl.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    if (remaining <= 0) {
      clearInterval(breakInterval);
      goToMath();
    }
  }, 1000);

  window.skipBreak = () => {
    clearInterval(breakInterval);
    goToMath();
  };
}

function goToMath() {
  // Math 모듈 준비되면 이 URL을 'math1.html'로 연결
  window.location.href = 'math1.html';
}

// ── INIT ──
initExam();
</script>
